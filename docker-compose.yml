services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real_estate_backend
    env_file:
      - .env
    command: poetry run uvicorn src.backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - backend_net

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real_estate_scraper
    env_file:
      - .env
    command: poetry run python src/scraper/main.py
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    networks:
      - backend_net

  db:
    image: postgres:16
    container_name: real_estate_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend_net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: real_estate_pgadmin
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: real_estate_redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

volumes:
  postgres_data:

networks:
  backend_net:
    driver: bridge